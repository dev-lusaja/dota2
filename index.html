<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Comics</title>
  <meta name="description" content="Explora y lee los cómics oficiales del universo de Dota 2. Galería completa con todos los cómics de Valve.">

  <!-- Canonical -->
  <link rel="canonical" href="https://dota2.devlusaja.com/">

  <!-- Open Graph (Facebook, Discord, WhatsApp, Telegram, LinkedIn…) -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://dota2.devlusaja.com/">
  <meta property="og:title"       content="Dota 2 Comics">
  <meta property="og:description" content="Explora y lee los cómics oficiales del universo de Dota 2. Galería completa con todos los cómics de Valve.">
  <meta property="og:image"       content="https://dota2.devlusaja.com/public/preview.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale"      content="es_ES">
  <meta property="og:site_name"   content="Dota 2 Comics">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:url"         content="https://dota2.devlusaja.com/">
  <meta name="twitter:title"       content="Dota 2 Comics">
  <meta name="twitter:description" content="Explora y lee los cómics oficiales del universo de Dota 2. Galería completa con todos los cómics de Valve.">
  <meta name="twitter:image"       content="https://dota2.devlusaja.com/public/preview.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css?v=5">

  <!-- JS YAML Parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>

  <div class="container">
    <header>
      <h1>
        <span class="dota-logo" aria-label="Dota 2 Logo"></span>
        Dota 2
      </h1>
      <p>Explora y lee contenido relacionado con el universo de Dota 2</p>
    </header>

    <nav class="main-nav">
      <button class="nav-tab active" data-target="comics-section">Cómics</button>
      <button class="nav-tab" data-target="tarot-section">Tarot</button>
    </nav>

    <div id="comics-section" class="content-section active">
      <div id="loading" class="loading">
        <i class="fas fa-spinner fa-spin"></i> Cargando librería...
      </div>

    <div id="gallery" class="comics-grid" style="display: none;">
      <!-- Las tarjetas de los cómics se insertarán aquí dinámicamente -->
    </div>
    </div> <!-- /comics-section -->

    <div id="tarot-section" class="content-section">
      <div class="tarot-controls">
        <span class="toggle-label">Estilo:</span>
        <label class="switch">
          <input type="checkbox" id="tarot-style-toggle">
          <span class="slider round"></span>
        </label>
        <span class="toggle-status" id="tarot-status-label">Color</span>
      </div>
      
      <div id="tarot-gallery" class="tarot-grid">
        <!-- Las cartas de tarot se insertarán aquí -->
      </div>
    </div> <!-- /tarot-section -->
  </div> <!-- /container -->

  <!-- Modal para Zoom -->
  <dialog id="image-modal" class="zoom-modal">
    <div class="modal-content">
      <button id="modal-close" class="modal-close-btn" aria-label="Cerrar"><i class="fas fa-times"></i></button>
      
      <div class="modal-image-container">
        <img id="modal-image" src="" alt="Zoom" loading="lazy">
      </div>
      
      <div class="modal-controls">
        <button id="modal-toggle-style" class="btn btn-secondary">
          <i class="fas fa-exchange-alt"></i> <span id="modal-toggle-text">Ver alterno</span>
        </button>
      </div>
    </div>
  </dialog>

  <script src="js/comics-loader.js?v=5"></script>
  <script src="js/progress.js?v=5"></script>
  <script src="js/gallery.js?v=5"></script>
  <script src="js/tarot.js?v=1"></script>
</body>
</html>
