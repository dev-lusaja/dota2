<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Comics Library</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  
  <!-- JS YAML Parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>

  <div class="container">
    <header>
      <h1>Dota 2 Comics</h1>
      <p>Explora y lee los cómics oficiales del universo de Dota 2</p>
    </header>

    <div id="loading" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Cargando librería...
    </div>

    <div id="gallery" class="comics-grid" style="display: none;">
      <!-- Las tarjetas de los cómics se insertarán aquí dinámicamente -->
    </div>
  </div>

  <script src="js/comics-loader.js?v=3"></script>
  <script src="js/gallery.js?v=3"></script>
</body>
</html>
